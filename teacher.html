<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard</title>

    <link rel="stylesheet" href="css/teacher.css">
</head>

<body>

    <div class="dashboard-container">

        <header class="dashboard-header">
            <h1>Teacher Dashboard</h1>

            <p id="teacher-name">
                Welcome, Teacher
            </p>

            <button id="logout-btn" class="logout-button">
                Logout
            </button>
        </header>

        <main class="dashboard-card">

            <h2>Manage Exams</h2>

            <p class="dashboard-subtitle">
                Create new exams, view your existing exams, and manage exam details.
            </p>

            <div class="dashboard-actions">

                <a href="createExam.html" class="dashboard-button primary">
                    Create New Exam
                </a>

            </div>

            <section class="my-exams-section">
                <h2>My Exams</h2>

                <p class="section-subtitle">
                    Here you can see all exams created by you.
                </p>

                <div id="teacher-exam-list"></div>
            </section>

        </main>

    </div>

    <script type="module" src="js/teacher.js"></script>
</body>

</html>
